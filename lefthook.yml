# lefthook configuration for AccelFury `af`.
#
# Opt-in pre-commit hook. Install with:
#   lefthook install
# See https://github.com/evilmartians/lefthook for installation per platform.
#
# CI runs the same checks independently; this hook just shortens the
# feedback loop locally. Skip with `LEFTHOOK=0 git commit ...` when needed.

pre-commit:
  parallel: false
  commands:
    contract-guard:
      run: .claude/skills/af-cli-contract-guard/check.sh
    agent-policy:
      glob: "{CLAUDE.md,docs/agent-workflow.md,docs/testing-strategy.md,.claude/**/*.md,tools/ts/agent_policy_check.ts}"
      run: if command -v deno >/dev/null 2>&1; then deno task check:agents; else echo "deno not installed; skipping agent-policy check"; fi
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "crates/**/*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings
