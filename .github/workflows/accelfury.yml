# Generated by AccelFury IP Toolchain
name: AccelFury CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: contract guard
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            AF_GUARD_BASE="${{ github.event.pull_request.base.sha }}" .claude/skills/af-cli-contract-guard/check.sh
          else
            .claude/skills/af-cli-contract-guard/check.sh
          fi
      - name: CLI smoke
        run: |
          set -euo pipefail
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/doctor doctor --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/self-check self check --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/registry registry check --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/manifest manifest validate examples/af-pdm-rx/af-core.toml --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/core-check core check examples/af-pdm-rx --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/core-report core report examples/af-pdm-rx --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/core-lint-native core lint examples/af-pdm-rx --backend native --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/wrapper-fusesoc wrapper generate examples/af-pdm-rx --target fusesoc --json
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/wrapper-litex wrapper generate examples/af-pdm-rx --target litex --board tang-nano-20k --json
          mkdir -p .af-build/ci-smoke/generated
          cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/ci-generate ci generate --target github-actions --output .af-build/ci-smoke/generated/accelfury.yml --json
      - name: Optional OSS CAD Suite hint
        run: |
          set -euo pipefail
          if command -v verilator >/dev/null 2>&1; then
            cargo run --quiet -p af-cli --bin af -- --build-root .af-build/ci-smoke/verilator core lint examples/af-pdm-rx --backend verilator --json
          else
            echo "Verilator not installed; backend is optional for MVP CI smoke."
          fi
      - name: Checksums
        if: always()
        run: |
          set -euo pipefail
          if [ -d .af-build ]; then
            mapfile -d '' files < <(find .af-build -type f -print0 | sort -z)
            if ((${#files[@]})); then
              sha256sum "${files[@]}" > .af-build/SHA256SUMS
            fi
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accelfury-reports
          path: .af-build/**
  docker-open-source-flow:
    runs-on: ubuntu-latest
    env:
      RUST_TOOLCHAIN: 1.95.0-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build Docker runtime
        run: docker build --build-arg RUST_TOOLCHAIN=$RUST_TOOLCHAIN -t accelfury-af:ci .
      - name: Docker smoke
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -v "$HOME/.cargo/git:/usr/local/cargo/git" \
            -v "/tmp/af-docker-target:/tmp/af-target" \
            -w /work \
            -e AF_BUILD_ROOT=/work/.af-build/docker-smoke \
            -e RUSTUP_TOOLCHAIN=$RUST_TOOLCHAIN \
            -e CARGO_TARGET_DIR=/tmp/af-target \
            accelfury-af:ci scripts/docker-smoke.sh
      - name: Docker smoke checksums
        if: always()
        run: |
          set -euo pipefail
          if [ -d .af-build/docker-smoke ]; then
            mapfile -d '' files < <(find .af-build/docker-smoke -type f -print0 | sort -z)
            if ((${#files[@]})); then
              sha256sum "${files[@]}" > .af-build/docker-smoke/SHA256SUMS
            fi
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accelfury-docker-reports
          path: .af-build/docker-smoke/**
