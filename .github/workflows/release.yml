# Generated by AccelFury IP Toolchain
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.2.0-rc.1"
        required: true
        default: "v0.2.0-rc.1"
      ref:
        description: "Git ref/SHA to release"
        required: true
        default: "main"
      ci_run_id:
        description: "Successful AccelFury CI run id for the same commit"
        required: true

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RUST_TOOLCHAIN: 1.95.0-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.ci_run_id }}
          name: accelfury-ci-evidence
          path: .af-build/release
          github-token: ${{ github.token }}
      - name: Build Linux x86_64 release binary
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          cargo build --locked --release -p af-cli --bin af
          mkdir -p .af-build/release/artifacts
          tar -czf ".af-build/release/artifacts/af-${TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            -C target/release af
          (cd .af-build/release/artifacts && sha256sum "af-${TAG}-x86_64-unknown-linux-gnu.tar.gz" > SHA256SUMS)
      - name: Build and publish Docker image
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/af:${TAG}"
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build --build-arg RUST_TOOLCHAIN=$RUST_TOOLCHAIN -t "$IMAGE" .
          docker push "$IMAGE"
          DIGEST="$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')"
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -v "$HOME/.cargo/git:/usr/local/cargo/git" \
            -v "/tmp/af-release-target:/tmp/af-target" \
            -w /work \
            -e AF_BUILD_ROOT=/work/.af-build/release/docker-smoke \
            -e RUSTUP_TOOLCHAIN=$RUST_TOOLCHAIN \
            -e CARGO_TARGET_DIR=/tmp/af-target \
            "${IMAGE}@${DIGEST}" scripts/docker-smoke.sh
          if [ -d .af-build/release/docker-smoke ]; then
            mapfile -d '' files < <(find .af-build/release/docker-smoke -type f -print0 | sort -z)
            if ((${#files[@]})); then
              sha256sum "${files[@]}" > .af-build/release/docker-smoke/SHA256SUMS
            fi
          fi
          cat > .af-build/release/docker-image.json <<JSON
          {
            "image": "$IMAGE",
            "digest": "$DIGEST",
            "smoke_report": ".af-build/release/docker-smoke",
            "smoke_sha256sums": ".af-build/release/docker-smoke/SHA256SUMS"
          }
          JSON
      - name: Production release gate
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          cargo run --quiet -p af-cli --bin af -- \
            --build-root .af-build \
            release check \
            --tag "$TAG" \
            --ci-evidence .af-build/release/ci-evidence.json \
            --artifact-dir .af-build/release/artifacts \
            --docker-evidence .af-build/release/docker-image.json \
            --output .af-build/release/release-readiness.json \
            --json
      - name: Release notes from CHANGELOG
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          awk -v version="$VERSION" '
            /^## / {
              if (capture) { exit }
              capture = index($0, "## " version) == 1
              next
            }
            capture { print }
          ' CHANGELOG.md > .af-build/release/RELEASE_NOTES.md
          test -s .af-build/release/RELEASE_NOTES.md
      - name: Upload release readiness bundle
        uses: actions/upload-artifact@v4
        with:
          name: accelfury-release-${{ inputs.tag }}
          path: .af-build/release/**
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            .af-build/release/artifacts/* \
            .af-build/release/release-readiness.json \
            .af-build/release/docker-image.json \
            --title "AccelFury af ${TAG}" \
            --notes-file .af-build/release/RELEASE_NOTES.md
