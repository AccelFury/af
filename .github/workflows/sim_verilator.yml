name: sim-verilator

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: install verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: generate vectors
        run: cargo run -p af-cli --bin af -- vectors generate
      - name: simulate af-pdm-rx
        run: cargo run -p af-cli --bin af -- core sim examples/af-pdm-rx --backend verilator
